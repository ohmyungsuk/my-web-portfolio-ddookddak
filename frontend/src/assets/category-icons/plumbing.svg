      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="pipe_h" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#90CAF9"/>
      <stop offset="50%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
