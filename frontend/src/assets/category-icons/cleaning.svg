  <line x1="17" y1="46" x2="16" y2="48" stroke="#6A1B9A" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="23" y1="46" x2="22" y2="48" stroke="#6A1B9A" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="29" y1="46" x2="28" y2="48" stroke="#6A1B9A" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="35" y1="46" x2="34" y2="48" stroke="#6A1B9A" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="41" y1="46" x2="40" y2="48" stroke="#6A1B9A" stroke-width="2.2" stroke-linecap="round"/>
