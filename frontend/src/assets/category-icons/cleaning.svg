      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
    <linearGradient id="head_g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BA68C8"/>
