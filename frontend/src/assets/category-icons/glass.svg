<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="pane_fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B3E5FC"/>
      <stop offset="100%" stop-color="#4FC3F7"/>
    </linearGradient>
  </defs>
  <!-- Frame -->
  <rect x="3" y="3" width="42" height="42" rx="6" fill="none" stroke="#0288D1" stroke-width="3.5"/>
  <!-- Horizontal divider -->
  <rect x="3" y="21" width="42" height="6" fill="#0288D1"/>
  <!-- Vertical divider -->
  <rect x="21" y="3" width="6" height="42" fill="#0288D1"/>
  <!-- Re-draw frame on top -->
  <rect x="3" y="3" width="42" height="42" rx="6" fill="none" stroke="#0288D1" stroke-width="3.5"/>
  <!-- Top-left pane -->
  <rect x="5.5" y="5.5" width="13.5" height="13.5" rx="2" fill="url(#pane_fill)"/>
  <path d="M6.5 6.5 L14 14" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.8"/>
  <path d="M6.5 10.5 L10.5 14.5" stroke="white" stroke-width="1.3" stroke-linecap="round" stroke-opacity="0.55"/>
  <!-- Top-right pane -->
  <rect x="29" y="5.5" width="13.5" height="13.5" rx="2" fill="url(#pane_fill)"/>
  <path d="M30 6.5 L37.5 14" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.8"/>
  <!-- Bottom-left pane -->
  <rect x="5.5" y="29" width="13.5" height="13.5" rx="2" fill="url(#pane_fill)" fill-opacity="0.75"/>
  <path d="M6.5 30 L14 37.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>
  <!-- Bottom-right pane -->
  <rect x="29" y="29" width="13.5" height="13.5" rx="2" fill="url(#pane_fill)" fill-opacity="0.75"/>
  <path d="M30 30 L37.5 37.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>
  <!-- Center handle -->
  <rect x="20" y="19" width="8" height="10" rx="4" fill="#0288D1" stroke="#01579B" stroke-width="1"/>
</svg>
