<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="washer_body" x1="4" y1="2" x2="44" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
  </defs>
  <!-- Body -->
  <rect x="4" y="2" width="40" height="44" rx="7" fill="url(#washer_body)"/>
  <!-- Top panel shine -->
  <rect x="6" y="4" width="36" height="10" rx="5" fill="white" fill-opacity="0.16"/>
  <!-- Knob -->
  <circle cx="38" cy="9" r="4.5" fill="#1B5E20"/>
  <circle cx="38" cy="9" r="2.5" fill="#2E7D32"/>
  <circle cx="37" cy="8" r="1" fill="white" fill-opacity="0.45"/>
  <!-- LED -->
  <circle cx="10" cy="9" r="2" fill="#69F0AE"/>
  <circle cx="16" cy="9" r="2" fill="white" fill-opacity="0.35"/>
  <!-- Door outer ring -->
  <circle cx="24" cy="30" r="17" fill="#1B5E20"/>
  <circle cx="24" cy="30" r="14.5" fill="#163D18"/>
  <!-- Glass door -->
  <circle cx="24" cy="30" r="12" fill="#1A4A1C"/>
  <!-- Spin ring -->
  <circle cx="24" cy="30" r="9" fill="none" stroke="#4CAF50" stroke-width="1.2" stroke-opacity="0.5" stroke-dasharray="5 3"/>
  <!-- Clothes wave -->
  <path d="M17 28 Q20.5 24 24 28 Q27.5 32 31 28" stroke="#69F0AE" stroke-width="2.2" stroke-linecap="round" fill="none" stroke-opacity="0.85"/>
  <!-- Door shine arc -->
  <path d="M15 20 Q20 16 26 19" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none" stroke-opacity="0.22"/>
  <!-- Door handle -->
  <path d="M38 27 Q41 30 38 33" stroke="#4CAF50" stroke-width="2" stroke-linecap="round" fill="none"/>
</svg>
