<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="cam_body" x1="4" y1="16" x2="44" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#78909C"/>
      <stop offset="100%" stop-color="#263238"/>
    </linearGradient>
  </defs>
  <!-- Mount arm -->
  <rect x="20" y="4" width="8" height="14" rx="4" fill="#37474F"/>
  <!-- Camera body -->
  <rect x="4" y="17" width="36" height="16" rx="6" fill="url(#cam_body)"/>
  <!-- Body shine -->
  <rect x="6" y="19" width="32" height="6" rx="3" fill="white" fill-opacity="0.12"/>
  <!-- Lens outer -->
  <circle cx="33" cy="25" r="8.5" fill="#1A237E"/>
  <circle cx="33" cy="25" r="6" fill="#0D1857"/>
  <circle cx="33" cy="25" r="3.5" fill="#1A237E"/>
  <circle cx="33" cy="25" r="8.5" fill="none" stroke="#455A64" stroke-width="1.2"/>
  <!-- Lens shine -->
  <circle cx="31.5" cy="23.5" r="1.5" fill="white" fill-opacity="0.55"/>
  <!-- REC dot -->
  <circle cx="11" cy="21" r="3" fill="#F44336"/>
  <circle cx="11" cy="21" r="1.4" fill="#FF8A80"/>
  <!-- Body detail lines -->
  <rect x="6" y="27" width="16" height="2" rx="1" fill="white" fill-opacity="0.25"/>
  <rect x="6" y="30.5" width="11" height="1.5" rx="0.7" fill="white" fill-opacity="0.16"/>
  <!-- Stand post -->
  <rect x="19" y="41" width="10" height="5" rx="2.5" fill="#37474F"/>
  <rect x="14" y="46" width="20" height="4" rx="2" fill="#455A64"/>
