<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="sign_fill" x1="4" y1="12" x2="44" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
  </defs>
  <!-- Chains -->
  <line x1="14" y1="2" x2="14" y2="12" stroke="#E64A19" stroke-width="2" stroke-linecap="round" stroke-dasharray="2.5 2.5"/>
  <line x1="34" y1="2" x2="34" y2="12" stroke="#E64A19" stroke-width="2" stroke-linecap="round" stroke-dasharray="2.5 2.5"/>
  <circle cx="14" cy="2" r="2.5" fill="#E64A19"/>
  <circle cx="34" cy="2" r="2.5" fill="#E64A19"/>
  <!-- Sign board -->
  <rect x="4" y="11" width="40" height="28" rx="8" fill="url(#sign_fill)"/>
  <!-- Top shine -->
  <rect x="6" y="13" width="36" height="10" rx="5" fill="white" fill-opacity="0.18"/>
  <!-- Text lines -->
  <rect x="10" y="18" width="28" height="4" rx="2" fill="white" fill-opacity="0.8"/>
  <rect x="12" y="25" width="24" height="3.5" rx="1.7" fill="white" fill-opacity="0.55"/>
  <rect x="14" y="32" width="20" height="3" rx="1.5" fill="white" fill-opacity="0.36"/>
  <!-- LED strip -->
  <rect x="8" y="36.5" width="32" height="2.5" rx="1.2" fill="#FFAB91"/>
  <circle cx="16" cy="37.8" r="1.1" fill="white" fill-opacity="0.9"/>
  <circle cx="24" cy="37.8" r="1.1" fill="white" fill-opacity="0.9"/>
  <circle cx="32" cy="37.8" r="1.1" fill="white" fill-opacity="0.9"/>
</svg>
